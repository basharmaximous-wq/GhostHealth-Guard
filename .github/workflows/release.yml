name: Multi-Arch Release

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runs-on: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runs-on: ubuntu-latest
          - target: x86_64-apple-darwin
            runs-on: macos-latest
          - target: aarch64-apple-darwin
            runs-on: macos-latest

    uses: ./.github/workflows/linux-build-reusable.yml
    with:
      target: ${{ matrix.target }}
      runs-on: ${{ matrix.runs-on }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Package
        shell: bash
        run: |
          cd artifacts
          for dir in */; do
            dirname="${dir%/}"
            echo "Packaging $dirname..."
            # Using '.' ensures we grab the binary inside the folder 
            # regardless of the specific filename
            tar -czf "${dirname}.tar.gz" -C "$dirname" .
          done

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
          # FIX: This uses 'latest' as the tag so it never fails on master push
          tag_name: latest
          name: Latest Release Build
          # Overwrites the same release instead of creating 100 separate ones
          make_latest: true
