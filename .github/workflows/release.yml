name: Multi-Arch Release

on:
  push:
   branches: [master]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runs-on: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runs-on: ubuntu-latest
          - target: x86_64-apple-darwin
            runs-on: macos-latest
          - target: aarch64-apple-darwin
            runs-on: macos-latest
          - target: x86_64-pc-windows-msvc
            runs-on: windows-latest

    uses: ./.github/workflows/linux-build-reusable.yml
    with:
      target: ${{ matrix.target }}
      runs-on: ${{ matrix.runs-on }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Package
        run: |
          cd artifacts
          for dir in */; do
            # Remove trailing slash
            dirname="${dir%/}"
            echo "Packaging $dirname..."
            if [ -f "$dirname/ghosthealth-guard.exe" ]; then
              zip -j "${dirname}.zip" "$dirname/ghosthealth-guard.exe"
            else
              tar -czf "${dirname}.tar.gz" -C "$dirname" ghosthealth-guard
            fi
          done

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
          generate_release_notes: true
