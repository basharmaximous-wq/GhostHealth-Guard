name: Build Reusable

on:
  workflow_call:
    inputs:
      target:
        required: true
        type: string
      runs-on:
        required: true
        type: string
permissions:
  contents: read
  
jobs:
  build:
    runs-on: ${{ inputs.runs-on }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ inputs.target }}

      - name: Install cross-compilation tools
        if: inputs.target == 'aarch64-unknown-linux-gnu' && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ inputs.target }}

      - name: Build
        run: |
          if [ "${{ inputs.target }}" = "aarch64-unknown-linux-gnu" ] && [ "${{ runner.os }}" = "Linux" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          cargo build --release --target ${{ inputs.target }} --all-features

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghosthealth-guard-${{ inputs.target }}
          path: target/${{ inputs.target }}/release/ghosthealth-guard
          if-no-files-found: error
